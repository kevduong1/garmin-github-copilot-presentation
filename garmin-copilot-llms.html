<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Copilot &amp; LLMs — Garmin</title>

<!-- ============================================================
     FONTS  — mirror of the Garmin brand template
       Archivo Narrow → condensed display headlines  (≈ Arial Narrow)
       Archivo        → body / UI
       JetBrains Mono → dates, labels, code           (≈ Consolas)
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@400;500;600;700&family=Archivo:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ============================================================
   THEME TOKENS  — grayscale brand-template palette.
   Garmin blue is used only as a whisper-quiet accent
   (the delta mark, thin rules, active nav dot).
   ============================================================ */
:root{
  --stage-bg:#d9dbde;                 /* letterbox surround */
  --slide-bg:#eef0f2;                 /* light canvas (gradient applied per-slide) */

  --ink:#171717;                      /* headlines / primary */
  --gray:#666666;                     /* body */
  --gray2:#878787;                    /* labels / meta */
  --line:#d7dade;                     /* hairline */
  --card:#f3f4f6;                     /* fill blocks */

  --blue:#007cc3;                     /* Garmin accent (sparing) */

  --font-cond:'Archivo Narrow',sans-serif;
  --font-body:'Archivo',sans-serif;
  --font-mono:'JetBrains Mono',monospace;

  --ease:cubic-bezier(.16,1,.3,1);
  --dur:.7s;
}
*{margin:0;padding:0;box-sizing:border-box}

/* ===========================================
   FIXED 16:9 STAGE — MANDATORY BASE (verbatim)
   =========================================== */
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--stage-bg,#000)}
.deck-viewport{position:fixed;inset:0;overflow:hidden;background:var(--stage-bg,#000)}
.deck-stage{position:absolute;left:0;top:0;width:1920px;height:1080px;overflow:hidden;transform-origin:0 0;background:var(--slide-bg,#fff)}
.slide{position:absolute;inset:0;width:1920px;height:1080px;overflow:hidden;display:block;visibility:hidden;opacity:0;pointer-events:none;background:var(--slide-bg,#fff)}
.slide.active,.slide.visible{visibility:visible;opacity:1;pointer-events:auto;z-index:1}
img,video,canvas,svg{max-width:100%;max-height:100%}
.deck-controls{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:1000}
@media print{
  html,body{width:1920px;height:auto;overflow:visible;background:#fff}
  .deck-viewport{position:static;overflow:visible;background:#fff}
  .deck-stage{position:static;width:auto;height:auto;transform:none!important;background:none}
  .slide{position:relative;display:block!important;visibility:visible!important;opacity:1!important;pointer-events:auto!important;width:1920px;height:1080px;break-after:page;page-break-after:always}
  .slide:last-child{break-after:auto;page-break-after:auto}
  .deck-controls{display:none!important}
}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.2s!important}}

/* ===========================================
   CANVAS  — soft light gradient (matches template)
   =========================================== */
.slide{color:var(--ink);font-family:var(--font-body);
  background:radial-gradient(125% 90% at 50% 16%,#ffffff 0%,#eef0f2 58%,#e5e7ea 100%)}
.pad{position:absolute;inset:0;padding:150px 150px 120px;display:flex;flex-direction:column}
.slide.center .pad{align-items:center;justify-content:center;text-align:center}

/* ===========================================
   BRAND MARK  (Garmin delta + wordmark) — top center
   =========================================== */
.brand{position:absolute;top:52px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:11px;z-index:4}
.brand .delta{width:22px;height:20px;display:block}
.brand .wm{font-family:var(--font-cond);font-weight:700;font-size:22px;letter-spacing:.34em;color:var(--ink);padding-left:3px}
.brand.lg .delta{width:30px;height:27px}
.brand.lg .wm{font-size:30px}

/* ===========================================
   TYPOGRAPHY PRIMITIVES
   =========================================== */
.kicker{font-family:var(--font-mono);font-size:19px;font-weight:500;letter-spacing:.28em;
  text-transform:uppercase;color:var(--gray2)}
.kicker .b{color:var(--blue)}

/* condensed uppercase headline = the template signature */
.h-hero{font-family:var(--font-cond);font-weight:700;text-transform:uppercase;letter-spacing:.012em;
  font-size:150px;line-height:.94;color:var(--ink)}
.h2{font-family:var(--font-cond);font-weight:700;text-transform:uppercase;letter-spacing:.012em;
  font-size:92px;line-height:.98;color:var(--ink)}

.lead{font-size:34px;line-height:1.45;color:var(--gray);font-weight:400;max-width:26ch}
.body{font-size:28px;line-height:1.55;color:var(--gray);font-weight:400}
.date{font-family:var(--font-mono);font-size:20px;letter-spacing:.14em;color:var(--gray2)}
.blue{color:var(--blue)}

.rule{width:96px;height:3px;background:var(--blue);border:none}
.hair{height:1px;background:var(--line);border:none;width:100%}

/* ===========================================
   COVER  (TITLE OF DECK — centered)
   =========================================== */
.cover .kicker{margin-bottom:44px}
.cover .h-hero{margin-bottom:40px}
.cover .h-hero .amp{color:var(--blue)}
.cover .sub{font-size:32px;color:var(--gray);max-width:32ch;line-height:1.45;margin-bottom:50px}
.cover .date{font-size:22px;letter-spacing:.22em}

/* ===========================================
   CONTENTS  (agenda)
   =========================================== */
.head-row{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:56px}
.agenda{display:flex;flex-direction:column}
.arow{display:flex;align-items:baseline;gap:44px;padding:30px 4px;border-bottom:1px solid var(--line)}
.arow:first-child{border-top:1px solid var(--line)}
.arow .n{font-family:var(--font-mono);font-size:22px;color:var(--blue);width:56px;flex:none}
.arow .t{font-family:var(--font-cond);font-weight:700;text-transform:uppercase;letter-spacing:.01em;font-size:46px;color:var(--ink)}
.arow .d{margin-left:auto;font-family:var(--font-mono);font-size:18px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray2);align-self:center}

/* ===========================================
   REVEAL ANIMATIONS
   =========================================== */
.reveal{opacity:0;transform:translateY(24px);transition:opacity var(--dur) var(--ease),transform var(--dur) var(--ease)}
.slide.visible .reveal{opacity:1;transform:none}
.slide.visible .reveal:nth-child(1){transition-delay:.05s}
.slide.visible .reveal:nth-child(2){transition-delay:.13s}
.slide.visible .reveal:nth-child(3){transition-delay:.21s}
.slide.visible .reveal:nth-child(4){transition-delay:.29s}
.slide.visible .reveal:nth-child(5){transition-delay:.37s}
.slide.visible .stagger>*{opacity:0;transform:translateY(18px);animation:rise .6s var(--ease) forwards}
.slide.visible .stagger>*:nth-child(1){animation-delay:.16s}
.slide.visible .stagger>*:nth-child(2){animation-delay:.26s}
.slide.visible .stagger>*:nth-child(3){animation-delay:.36s}
@keyframes rise{to{opacity:1;transform:none}}

/* ===========================================
   CHROME  (fixed — grayscale)
   =========================================== */
.dots{position:fixed;right:26px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:13px;z-index:1000}
.dots button{width:9px;height:9px;border-radius:50%;border:none;background:#c1c6cc;cursor:pointer;padding:0;transition:.3s var(--ease)}
.dots button.on{background:var(--blue);transform:scale(1.35)}
.arrows{position:fixed;left:30px;bottom:28px;display:flex;gap:12px;z-index:1000}
.arrows button{width:44px;height:44px;border:1px solid #c1c6cc;background:rgba(255,255,255,.7);color:#171717;font-size:20px;cursor:pointer;transition:.25s var(--ease);display:flex;align-items:center;justify-content:center}
.arrows button:hover{background:var(--ink);border-color:var(--ink);color:#fff}
.counter{position:fixed;right:30px;bottom:30px;font-family:var(--font-mono);font-size:16px;letter-spacing:.14em;color:#9aa0a7;z-index:1000}
.counter b{color:#171717;font-weight:500}

/* edit chrome */
.edit-hotzone{position:fixed;top:0;left:0;width:80px;height:80px;z-index:10000;cursor:pointer}
.edit-toggle{position:fixed;top:18px;left:18px;width:46px;height:46px;border:1px solid #c1c6cc;background:#fff;border-radius:50%;font-size:20px;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s;z-index:10001}
.edit-toggle.show,.edit-toggle.active{opacity:1;pointer-events:auto}
.edit-toggle.active{background:var(--blue);border-color:var(--blue)}
.editing [contenteditable]{outline:2px dashed var(--blue);outline-offset:6px}
.edit-hint{position:fixed;top:20px;left:74px;font-family:var(--font-mono);font-size:13px;color:#9aa0a7;background:#fff;padding:8px 12px;border:1px solid #c1c6cc;opacity:0;transition:.3s;z-index:10001;pointer-events:none}
.edit-hint.show{opacity:1}
</style>
</head>
<body>
<div class="deck-viewport">
  <main class="deck-stage" id="deckStage">

    <!-- ========== 1 · TITLE ========== -->
    <section class="slide cover center active">
      <div class="brand lg reveal"><svg class="delta" viewBox="0 0 44 40"><path d="M22 2 42 38H2L22 2Z" fill="#007cc3"/></svg><span class="wm">GARMIN</span></div>
      <div class="pad">
        <div class="kicker reveal">Engineering&nbsp;·&nbsp;Internal Tech Talk</div>
        <h1 class="h-hero reveal">GitHub Copilot<br><span class="amp">&amp;</span> LLMs</h1>
        <p class="sub reveal">A starting template — add slides as the talk takes shape.</p>
        <div class="date reveal">07.08.2026</div>
      </div>
    </section>

    <!-- ========== 2 · CONTENTS (placeholder) ========== -->
    <section class="slide">
      <div class="brand"><svg class="delta" viewBox="0 0 44 40"><path d="M22 2 42 38H2L22 2Z" fill="#007cc3"/></svg><span class="wm">GARMIN</span></div>
      <div class="pad">
        <div class="head-row">
          <h2 class="h2 reveal">Contents</h2>
          <div class="kicker reveal">Outline</div>
        </div>
        <div class="agenda stagger">
          <div class="arow"><span class="n">01</span><span class="t">Topic one</span><span class="d">Placeholder</span></div>
          <div class="arow"><span class="n">02</span><span class="t">Topic two</span><span class="d">Placeholder</span></div>
          <div class="arow"><span class="n">03</span><span class="t">Topic three</span><span class="d">Placeholder</span></div>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- ===== CHROME ===== -->
<nav class="dots" id="dots" aria-label="Slides"></nav>
<div class="arrows"><button id="prev" aria-label="Previous slide">‹</button><button id="next" aria-label="Next slide">›</button></div>
<div class="counter" id="counter"><b>01</b> / 02</div>

<div class="edit-hotzone" id="editHotzone"></div>
<button class="edit-toggle" id="editToggle" title="Edit mode (E)">✏️</button>
<div class="edit-hint" id="editHint">Click text to edit · Ctrl/⌘+S to save</div>

<script>
/* ============================================================
   SLIDE CONTROLLER  (fixed 16:9 stage scaling + nav)
   ============================================================ */
class Deck{
  constructor(){
    this.slides=[...document.querySelectorAll('.slide')];
    this.stage=document.getElementById('deckStage');
    this.i=0;this.buildDots();this.scale();
    addEventListener('resize',()=>this.scale());
    this.keys();this.wheel();this.touch();this.go(0);
  }
  scale(){
    const f=Math.min(innerWidth/1920,innerHeight/1080);
    this.stage.style.transform=`translate(${(innerWidth-1920*f)/2}px,${(innerHeight-1080*f)/2}px) scale(${f})`;
  }
  buildDots(){
    const c=document.getElementById('dots');
    this.slides.forEach((_,n)=>{const b=document.createElement('button');
      b.setAttribute('aria-label','Go to slide '+(n+1));b.onclick=()=>this.go(n);c.appendChild(b)});
    this.dots=[...c.children];
  }
  go(n){
    this.i=Math.max(0,Math.min(n,this.slides.length-1));
    this.slides.forEach((s,k)=>{s.classList.toggle('active',k===this.i);s.classList.toggle('visible',k===this.i)});
    this.dots.forEach((d,k)=>d.classList.toggle('on',k===this.i));
    document.getElementById('counter').innerHTML=`<b>${String(this.i+1).padStart(2,'0')}</b> / ${String(this.slides.length).padStart(2,'0')}`;
  }
  next(){this.go(this.i+1)} prev(){this.go(this.i-1)}
  keys(){addEventListener('keydown',e=>{
    if(e.target.getAttribute&&e.target.getAttribute('contenteditable'))return;
    if(['ArrowRight',' ','PageDown'].includes(e.key)){e.preventDefault();this.next()}
    else if(['ArrowLeft','PageUp'].includes(e.key)){e.preventDefault();this.prev()}
    else if(e.key==='Home')this.go(0); else if(e.key==='End')this.go(this.slides.length-1);
  })}
  wheel(){let lock=false;addEventListener('wheel',e=>{
    if(lock||Math.abs(e.deltaY)<24)return;lock=true;e.deltaY>0?this.next():this.prev();
    setTimeout(()=>lock=false,650);},{passive:true})}
  touch(){let x0=0,y0=0;
    addEventListener('touchstart',e=>{x0=e.touches[0].clientX;y0=e.touches[0].clientY},{passive:true});
    addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-x0,dy=e.changedTouches[0].clientY-y0;
      if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy))dx<0?this.next():this.prev();},{passive:true})}
}
const deck=new Deck();
document.getElementById('next').onclick=()=>deck.next();
document.getElementById('prev').onclick=()=>deck.prev();

/* ============================================================
   INLINE EDITING  (E / hover hotzone / click) + localStorage
   ============================================================ */
const editor={
  isActive:false,key:'garmin-copilot-deck-v3-starter',
  toggle(){
    this.isActive=!this.isActive;
    document.body.classList.toggle('editing',this.isActive);
    document.getElementById('editToggle').classList.toggle('active',this.isActive);
    document.getElementById('editHint').classList.toggle('show',this.isActive);
    document.querySelectorAll('.slide h1,.slide h2,.slide p,.slide span,.slide .t,.slide .d')
      .forEach(el=>el.contentEditable=this.isActive);
    if(!this.isActive)this.save();
  },
  save(){const d={};document.querySelectorAll('.slide').forEach((s,i)=>d[i]=s.innerHTML);
    try{localStorage.setItem(this.key,JSON.stringify(d))}catch(e){}},
  load(){try{const d=JSON.parse(localStorage.getItem(this.key)||'null');if(!d)return;
    document.querySelectorAll('.slide').forEach((s,i)=>{if(d[i])s.innerHTML=d[i]})}catch(e){}}
};
editor.load();
const hz=document.getElementById('editHotzone'),tg=document.getElementById('editToggle');let ht=null;
const show=()=>{clearTimeout(ht);tg.classList.add('show')};
const hide=()=>{ht=setTimeout(()=>{if(!editor.isActive)tg.classList.remove('show')},400)};
hz.addEventListener('mouseenter',show);hz.addEventListener('mouseleave',hide);
tg.addEventListener('mouseenter',show);tg.addEventListener('mouseleave',hide);
hz.addEventListener('click',()=>editor.toggle());tg.addEventListener('click',()=>editor.toggle());
addEventListener('keydown',e=>{
  if((e.key==='e'||e.key==='E')&&!e.target.getAttribute('contenteditable'))editor.toggle();
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();editor.save();
    const h=document.getElementById('editHint');h.textContent='Saved ✓';h.classList.add('show');
    setTimeout(()=>{h.textContent='Click text to edit · Ctrl/⌘+S to save';if(!editor.isActive)h.classList.remove('show')},1200)}
});
</script>
</body>
</html>
