<!-- ========== 7B · ACCESSING COPILOT IN VS CODE ========== -->
<style>
  .s-vscode-access .head{margin-bottom:30px}
  .s-vscode-access .head .rule{margin-top:30px}
  .s-vscode-access .content{display:grid;grid-template-columns:390px 1fr;gap:42px;align-items:center;flex:1}
  .s-vscode-access .lead{margin-top:0;font:700 48px/1.03 var(--font-cond);text-transform:uppercase;color:var(--ink)}
  .s-vscode-access .body{margin-top:24px;font-size:24px;line-height:1.38;color:var(--gray)}
  .s-vscode-access .shortcut{
    margin-top:34px;padding:22px;border-top:3px solid var(--blue);background:rgba(255,255,255,.5);
  }
  .s-vscode-access .shortcut-label{font:500 14px var(--font-mono);letter-spacing:.15em;text-transform:uppercase;color:var(--gray2)}
  .s-vscode-access .keys{display:flex;align-items:center;gap:10px;margin-top:12px}
  .s-vscode-access kbd{
    min-width:88px;height:48px;padding:0 14px;border:1px solid #abb1b7;border-bottom-width:4px;background:#fff;
    display:inline-flex;align-items:center;justify-content:center;font:700 22px/1 var(--font-mono);color:var(--ink);
  }
  .s-vscode-access .key-name{margin-left:8px;font:700 23px/1.08 var(--font-cond);text-transform:uppercase;color:var(--ink)}
  .s-vscode-access .screen{
    height:690px;display:flex;align-items:center;justify-content:center;background:transparent;
  }
  .s-vscode-access .screen img{
    display:block;width:auto;height:auto;max-width:100%;max-height:690px;object-fit:contain;
    border:1px solid #81878d;box-shadow:0 18px 42px rgba(20,26,30,.18);
  }
</style>
<section class="slide s-vscode-access">
  <div class="brand"><svg class="delta" viewBox="0 0 44 40"><path d="M22 2 42 38H2L22 2Z" fill="#007cc3"/></svg><span class="wm">GARMIN</span></div>
  <div class="pad">
    <div class="head">
      <h2 class="h2 reveal">Accessing Copilot in VS Code</h2>
      <div class="rule reveal"></div>
    </div>
    <div class="content">
      <div>
        <p class="lead reveal">Chat lives in the right sidebar.</p>
        <p class="body reveal">Select Chat in the title bar, or toggle the entire right-side panel with the shortcut.</p>
        <div class="shortcut reveal">
          <div class="shortcut-label">Windows / Linux · Toggle Secondary Side Bar</div>
          <div class="keys"><kbd>Ctrl</kbd><kbd>Alt</kbd><kbd>B</kbd><span class="key-name">Show / hide Chat</span></div>
        </div>
      </div>
      <div class="screen reveal" aria-label="VS Code screenshot with the Chat icon highlighted in red">
        <img src="assets/vscode-chat-panel.png" alt="VS Code with its Chat panel open in the Secondary Side Bar">
      </div>
    </div>
  </div>
</section>
