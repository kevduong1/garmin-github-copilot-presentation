<!-- ========== 7C · UNDERSTANDING VS CODE CHAT · SESSIONS ========== -->
<style>
  .s-chat-history .head{margin-bottom:24px}
  .s-chat-history .head .rule{margin-top:30px}
  .s-chat-history .layout{display:grid;grid-template-columns:540px 1fr;gap:72px;align-items:center;flex:1}
  .s-chat-history .kicker{font:500 15px var(--font-mono);letter-spacing:.17em;text-transform:uppercase;color:var(--blue)}
  .s-chat-history .lead{margin-top:18px;font:700 52px/1.02 var(--font-cond);text-transform:uppercase;color:var(--ink)}
  .s-chat-history .body{margin-top:20px;font-size:24px;line-height:1.36;color:var(--gray)}
  .s-chat-history .shortcut{
    margin-top:24px;padding:18px 20px;border-top:3px solid var(--blue);display:flex;align-items:center;gap:18px;background:rgba(255,255,255,.48);
  }
  .s-chat-history .shortcut kbd{
    min-width:126px;height:55px;border:1px solid #abb1b7;border-bottom-width:4px;background:#fff;
    display:flex;align-items:center;justify-content:center;font:700 24px/1 var(--font-mono);color:var(--ink);
  }
  .s-chat-history .shortcut-copy{font:700 25px/1.08 var(--font-cond);text-transform:uppercase;color:var(--ink)}
  .s-chat-history .points{margin-top:24px;border-top:1px solid var(--line)}
  .s-chat-history .point{
    width:100%;padding:18px 14px;border:0;border-bottom:1px solid var(--line);background:transparent;
    display:grid;grid-template-columns:48px 1fr;gap:16px;text-align:left;cursor:pointer;color:var(--gray);
    transition:color .2s var(--ease),background .2s var(--ease);
  }
  .s-chat-history .point:hover,.s-chat-history .point:focus-visible,.s-chat-history .point.selected{
    background:#e5f2f9;box-shadow:inset 5px 0 var(--blue);color:var(--ink);outline:0;
  }
  .s-chat-history .point-number{font:500 16px var(--font-mono);color:var(--blue);padding-top:5px}
  .s-chat-history .point-title{display:block;font:700 29px/1.05 var(--font-cond);text-transform:uppercase}
  .s-chat-history .point-copy{display:block;margin-top:7px;font-size:18px;line-height:1.3;color:var(--gray)}
  .s-chat-history .context-note{margin-top:22px;padding-left:18px;border-left:4px solid var(--blue);font-size:21px;line-height:1.35;color:var(--gray)}
  .s-chat-history .preview{position:relative;top:-70px}
  .s-chat-history .demo{height:700px;overflow:visible}
  .s-chat-history .demo-panel{display:none;width:100%;height:100%;align-items:center;justify-content:center}
  .s-chat-history .demo-panel.show{display:flex}
  .s-chat-history .demo-panel img{
    display:block;width:auto;height:auto;max-width:100%;max-height:700px;object-fit:contain;
    transform:scale(1.25);transform-origin:center center;
    box-shadow:0 16px 36px rgba(20,26,30,.16);
  }
</style>
<section class="slide s-chat-history ai-continuation" data-continuation="vscode-chat" data-chat-history-demo>
  <div class="brand"><svg class="delta" viewBox="0 0 44 40"><path d="M22 2 42 38H2L22 2Z" fill="#007cc3"/></svg><span class="wm">GARMIN</span></div>
  <div class="pad">
    <div class="head"><h2 class="h2">VS Code Chat</h2><div class="rule"></div></div>
    <div class="layout ai-sequence-body reveal">
      <div>
        <div class="kicker">01 · Chats</div>
        <h3 class="lead">Start fresh—or continue the same work.</h3>
        <p class="body">A chat carries its prior messages and attached context. Keep one task or topic per chat.</p>
        <div class="shortcut"><kbd>Ctrl + N</kbd><span class="shortcut-copy">Start a new chat</span></div>
        <div class="points">
          <button class="point selected" type="button" data-chat-history-panel="new">
            <span class="point-number">01</span><span><span class="point-title">Start a new chat</span><span class="point-copy">Begin typing in an empty session for a new task.</span></span>
          </button>
          <button class="point" type="button" data-chat-history-panel="old">
            <span class="point-number">02</span><span><span class="point-title">Open an old chat</span><span class="point-copy">Return to a session when you are continuing that work.</span></span>
          </button>
        </div>
        <p class="context-note"><span class="blue">New task? New chat.</span> Avoid one giant conversation filled with unrelated context.</p>
      </div>
      <div class="preview">
        <div class="demo" aria-live="polite">
          <div class="demo-panel show" data-chat-history-image="new"><img src="assets/vscode-chat-sessions.png" alt="VS Code Chat sessions list with an empty prompt ready for a new chat"></div>
          <div class="demo-panel" data-chat-history-image="old"><img src="assets/vscode-chat-history.png" alt="A previously opened VS Code Chat conversation"></div>
        </div>
      </div>
    </div>
  </div>
</section>
