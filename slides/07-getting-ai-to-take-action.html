<!-- ========== 7 · AI MODELS ARE LIKE BRAINS ========== -->
<style>
  .s-brain .head{margin-bottom:42px}
  .s-brain .head .rule{margin-top:30px}

  .s-brain .vat-image{
    width:100%;height:560px;object-fit:contain;object-position:center;
    mix-blend-mode:multiply;
  }
  .s-brain .statement{
    margin-bottom:34px;font:700 58px/1.03 var(--font-cond);

  }
  .s-brain .points{border-top:1px solid var(--line)}
  .s-brain .point{display:grid;grid-template-columns:210px 1fr;gap:30px;padding:20px 0;border-bottom:1px solid var(--line)}
  .s-brain .point strong{font:700 27px/1 var(--font-cond);text-transform:uppercase;color:var(--ink)}
  .s-brain .point span{font-size:24px;line-height:1.3;color:var(--gray)}

<section class="slide s-brain">
  <div class="brand"><svg class="delta" viewBox="0 0 44 40"><path d="M22 2 42 38H2L22 2Z" fill="#007cc3"/></svg><span class="wm">GARMIN</span></div>
  <div class="pad">
    <div class="head">
      <h2 class="h2 reveal">AI Models Are Like Brains</h2>
      <div class="rule reveal"></div>
    </div>
    <div class="layout">
      <img class="vat-image reveal" src="assets/images/brain-in-a-vat.png" alt="A brain suspended inside a glass vat">
      <div>

        <div class="points stagger">

        </div>
      </div>
    </div>
  </div>
</section>
