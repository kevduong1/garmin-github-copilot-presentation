<!-- ========== 7C2 · UNDERSTANDING VS CODE CHAT · CONTEXT ========== -->
<style>
  .s-chat-context .head{margin-bottom:24px}
  .s-chat-context .head .rule{margin-top:30px}
  .s-chat-context .layout{display:grid;grid-template-columns:540px 1fr;gap:72px;align-items:center;flex:1}
  .s-chat-context .kicker{font:500 15px var(--font-mono);letter-spacing:.17em;text-transform:uppercase;color:var(--blue)}
  .s-chat-context .lead{margin-top:18px;font:700 52px/1.02 var(--font-cond);text-transform:uppercase;color:var(--ink)}
  .s-chat-context .body{margin-top:20px;font-size:24px;line-height:1.36;color:var(--gray)}
  .s-chat-context .points{margin-top:28px;border-top:1px solid var(--line)}
  .s-chat-context .point{
    width:100%;padding:19px 14px;border:0;border-bottom:1px solid var(--line);background:transparent;
    display:grid;grid-template-columns:48px 1fr;gap:16px;text-align:left;cursor:pointer;color:var(--gray);
    transition:color .2s var(--ease),background .2s var(--ease);
  }
  .s-chat-context .point:hover,.s-chat-context .point:focus-visible,.s-chat-context .point.selected{
    background:#e5f2f9;box-shadow:inset 5px 0 var(--blue);color:var(--ink);outline:0;
  }
  .s-chat-context .point-number{font:500 16px var(--font-mono);color:var(--blue);padding-top:5px}
  .s-chat-context .point-title{display:block;font:700 29px/1.05 var(--font-cond);text-transform:uppercase}
  .s-chat-context .point-copy{display:block;margin-top:7px;font-size:18px;line-height:1.3;color:var(--gray)}
  .s-chat-context .context-note{margin-top:22px;padding-left:18px;border-left:4px solid var(--blue);font-size:21px;line-height:1.35;color:var(--gray)}
  .s-chat-context .preview{position:relative;top:-58px}
  .s-chat-context .context-demo{height:700px;overflow:visible}
  .s-chat-context .context-demo-panel{display:none;width:100%;height:100%;align-items:center;justify-content:center}
  .s-chat-context .context-demo-panel.show{display:flex}
  .s-chat-context .context-demo-panel img{display:block;object-fit:contain;box-shadow:0 16px 36px rgba(20,26,30,.16)}
  .s-chat-context .context-demo-panel.portrait img{
    width:auto;height:690px;max-width:100%;transform:scale(1.25);transform-origin:center center;
  }
  .s-chat-context .context-demo-panel.wide img{width:100%;height:auto;max-height:690px}
</style>
<section class="slide s-chat-context ai-continuation" data-continuation="vscode-chat" data-context-inputs-demo>
  <div class="brand"><svg class="delta" viewBox="0 0 44 40"><path d="M22 2 42 38H2L22 2Z" fill="#007cc3"/></svg><span class="wm">GARMIN</span></div>
  <div class="pad">
    <div class="head"><h2 class="h2">VS Code Chat</h2><div class="rule"></div></div>
    <div class="layout ai-sequence-body reveal">
      <div>
        <div class="kicker">02 · Context inputs</div>
        <h3 class="lead">Show the model what matters.</h3>
        <p class="body">Your prompt and attachments become the working context for the current chat.</p>
        <div class="points">
          <button class="point selected" type="button" data-context-input-panel="typing">
            <span class="point-number">01</span><span><span class="point-title">Type directly</span><span class="point-copy">Describe the task, question, constraints, or expected result.</span></span>
          </button>
          <button class="point" type="button" data-context-input-panel="attachments">
            <span class="point-number">02</span><span><span class="point-title">Attach files and images</span><span class="point-copy">Add screenshots, pasted images, files, and other references.</span></span>
          </button>
          <button class="point" type="button" data-context-input-panel="selection">
            <span class="point-number">03</span><span><span class="point-title">Highlight code</span><span class="point-copy">Selected lines are automatically attached to the next prompt.</span></span>
          </button>
        </div>
        <p class="context-note"><span class="blue">Be specific.</span> Better inputs make it easier for the model to focus on the right problem.</p>
      </div>
      <div class="preview">
        <div class="context-demo" aria-live="polite">
          <div class="context-demo-panel portrait show" data-context-input-image="typing"><img src="assets/vscode-context-typing.gif" alt="Typing a prompt directly into VS Code Chat"></div>
          <div class="context-demo-panel wide" data-context-input-image="attachments"><img src="assets/vscode-context-attachments.png" alt="Files, images, and screenshots attached to a VS Code Chat prompt"></div>
          <div class="context-demo-panel wide" data-context-input-image="selection"><img src="assets/vscode-context-selection.png" alt="Highlighted code automatically attached to a VS Code Chat prompt"></div>
        </div>
      </div>
    </div>
  </div>
</section>
